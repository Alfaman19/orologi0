name: Auto-generate simple M3U

on:
  workflow_dispatch:        # puoi lanciare manualmente
  push:
    paths:
      - 'playlist.json'    # se modifichi questo file nel tuo repo, parte automaticamente

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download remote JSON
        run: |
          curl -s -o playlist.json https://raw.githubusercontent.com/riccamariofrancesco-cell/mariofr-repo/main/playlist.json

      - name: Generate simple M3U
        run: |
          python3 << 'EOF'
          import json

          # Legge il JSON scaricato
          with open("playlist.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          # Inizia playlist M3U
          m3u = "#EXTM3U\n"

          # Aggiunge tutti i canali senza categorie
          for ch in data:
              name = ch.get("name","Canale")
              url = ch.get("url","")
              m3u += f'#EXTINF:-1,{name}\n'
              m3u += f'{url}\n'

          # Scrive file finale
          with open("orologi0.txt","w", encoding="utf-8") as f:
              f.write(m3u)
          EOF

      - name: Commit orologi0.txt
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add orologi0.txt
          git commit -m "Auto-update orologi0.txt"
          git push
  
  
  
  
