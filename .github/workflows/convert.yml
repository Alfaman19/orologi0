name: Auto-update IPTV playlist with UA

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download JSON
        run: |
          curl -s -o playlist.json https://raw.githubusercontent.com/riccamariofrancesco-cell/mariofr-repo/main/playlist.json

      - name: Convert JSON to M3U with KodiProp and User-Agent
        run: |
          python3 << 'EOF'
          import json

          with open("playlist.json","r",encoding="utf-8") as f:
              data=json.load(f)

          m3u="#EXTM3U\n\n"

          for ch in data:
              name = ch.get("name","Canale")
              url = ch.get("url","")
              lic = ch.get("license","")
              ua = ch.get("user_agent","")  # User-Agent dal JSON se presente
              referer = ch.get("referer","")
              origin = ch.get("origin","")

              # Aggiunge KodiProp se c'è la licenza
              if lic:
                  m3u+="#KODIPROP:inputstream=inputstream.adaptive\n"
                  m3u+="#KODIPROP:inputstream.adaptive.license_type=org.w3.clearkey\n"
                  m3u+=f"#KODIPROP:inputstream.adaptive.license_key={lic}\n"

              # Aggiunge headers se presenti
              if ua or referer or origin:
                  opt=[]
                  if ua: opt.append(f"User-Agent={ua}")
                  if referer: opt.append(f"Referer={referer}")
                  if origin: opt.append(f"Origin={origin}")
                  headers="&".join(opt)
                  m3u+=f"#EXTVLCOPT:http-referrer={headers}\n"

              # Canale
              m3u+=f"#EXTINF:-1,{name}\n"
              m3u+=f"{url}\n\n"

          with open("orologi0.txt","w",encoding="utf-8") as f:
              f.write(m3u)
          EOF

      - name: Commit and push playlist
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add orologi0.txt
          git commit -m "Auto-update IPTV playlist with UA"
          git push
  
  
  
  
